name: 📖 Deploy Documentação (Showcase) - GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 📦 Checkout do Código-fonte
        uses: actions/checkout@v4
      
      - name: ⚙️ Configuração Ambiente Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          
      - name: 🌐 Setup GitHub Pages
        uses: actions/configure-pages@v5
        
      - name: 📥 Instalação de Dependências (Angular)
        run: npm install --legacy-peer-deps
        
      - name: 🏗️ Build da Aplicação Showcase
        run: npm run build gems-showcase -- --base-href /Angular-GEMS-SDK/
        
      - name: 📤 Upload Artifact (Arquivos Estáticos)
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'dist/gems-showcase/browser'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: 🚀 Deploy para o GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
