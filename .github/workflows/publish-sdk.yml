name: 📦 Publicação GEMS SDK - GitHub Packages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  publish-gpr:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: 📦 Checkout do Código-fonte
        uses: actions/checkout@v4
      - name: ⚙️ Configuração Ambiente Node.js 24 e Registry
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://npm.pkg.github.com'
      - name: 📥 Instalação de Dependências
        run: npm install --legacy-peer-deps
      - name: 🏗️ Build da Biblioteca GEMS SDK
        run: npm run build gems-sdk
      - name: 🚀 Empacotamento e Publicação (NPM Publish)
        run: |
          cd dist/gems-sdk
          VERSION=$(node -p "require('./package.json').version")
          if [[ "$VERSION" == *"-"* ]]; then
            npm publish --tag next
          else
            npm publish
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
