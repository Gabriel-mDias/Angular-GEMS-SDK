name: CI

on:
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Install dependencies
        run: npm install --legacy-peer-deps
      - name: Build Library (GEMS SDK)
        run: npm run build gems-sdk
      - name: Build Showcase App
        run: npm run build gems-showcase
