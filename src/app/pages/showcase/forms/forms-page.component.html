<div class="showcase-page fade-in">
  <div class="page-header">
    <h1>Formulários Simples</h1>
    <p class="gems-text-muted">Apresentação de campos de entrada e formulários padrão utilizando o componente <code>gems-form-card</code>.</p>
  </div>
  
  <div class="demo-section">
    <div class="demo-preview">
      <gems-form-card title="Cadastro de Usuário" icon="fa-solid fa-user-plus">
        <form (ngSubmit)="onSubmit()" #form="ngForm">
          <div class="form-grid">
            <gems-input-mask 
              label="CPF" 
              mask="000.000.000-00"
              [(ngModel)]="formData.cpf"
              name="cpf"
              required>
            </gems-input-mask>
      
            <gems-input-date 
              label="Data de Nascimento"
              [(ngModel)]="formData.dataNascimento"
              name="dataNascimento"
              required>
            </gems-input-date>
      
            <gems-input-password 
              label="Senha de Acesso"
              [(ngModel)]="formData.senha"
              name="senha"
              required>
            </gems-input-password>
          </div>
      
          <div class="checkbox-container">
            <gems-input-checkbox 
              label="Aceito os termos de uso e política de privacidade"
              [(ngModel)]="formData.aceitoTermos"
              name="termos">
            </gems-input-checkbox>
          </div>
      
          <div class="footer-actions">
            <button type="button" class="gems-btn-secondary" (click)="onCancel()">
              <i class="fa-solid fa-xmark"></i> Cancelar
            </button>
            <button type="submit" class="gems-btn-primary" [disabled]="!formData.aceitoTermos">
              <i class="fa-solid fa-check"></i> Salvar
            </button>
          </div>
        </form>
      </gems-form-card>
    </div>

    <div class="demo-code">
      <app-code-snippet [tabs]="codeTabs"></app-code-snippet>
    </div>
  </div>
</div>
