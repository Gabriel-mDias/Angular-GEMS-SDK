<div class="showcase-page fade-in">
  <div class="header">
    <div class="header-titles">
      <h2>Busca e Listagem</h2>
      <p class="subtitle">
        Padrão de tela com filtros de busca (
        <code>gems-form-card</code>
        ) integrados a uma tabela de resultados (
        <code>gems-table</code>
        ).
      </p>
    </div>
  </div>

  <div class="demo-section">
    <div class="demo-preview search-preview">
      <gems-form-card title="Filtros de Busca" icon="fa-solid fa-filter">
        <div class="form-grid">
          <div class="form-group">
            <span>Nome do Aluno</span>
            <input
              type="text"
              [(ngModel)]="filterParams.nome"
              class="form-control"
              placeholder="Ex: João"
            />
          </div>
          <div class="form-group">
            <span>Situação</span>
            <select [(ngModel)]="filterParams.situacao" class="form-control">
              <option value="">Todas as situações</option>
              @for (opt of situacaoOptions; track opt) {
              <option [value]="opt">{{ opt }}</option>
              }
            </select>
          </div>
        </div>

        <div gems-form-card-footer style="display: flex; gap: 0.5rem; justify-content: flex-end">
          <button type="button" class="btn-cancel" (click)="clearFilters()">
            Limpar
            <i class="fa-solid fa-eraser"></i>
          </button>
          <button type="button" class="btn-save" (click)="search()">
            Buscar
            <i class="fa-solid fa-search"></i>
          </button>
        </div>
      </gems-form-card>

      <div class="content-card">
        <gems-table
          [columns]="tableColumns"
          [data]="tableData"
          [actions]="tableActions"
          [totalRecords]="totalRecords"
          (actionClick)="handleAction($event)"
          (pageChange)="onPageChange($event)"
        ></gems-table>
      </div>
    </div>

    <div class="demo-code">
      <app-code-snippet [tabs]="codeTabs"></app-code-snippet>
    </div>
  </div>
</div>
