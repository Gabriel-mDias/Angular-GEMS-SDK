<div class="showcase-page fade-in">
  <div class="header">
    <div class="header-titles">
      <h2>File Upload</h2>
      <p class="subtitle">Componente para upload de arquivos com preview e progresso, integrado ao <code>GemsS3Service</code>.</p>
    </div>
  </div>

  <div class="demo-section">
    <div class="demo-preview">
      <gems-form-card title="Upload de Documentos" icon="fa-solid fa-cloud-arrow-up">
        <div style="padding-bottom: 2rem;">
          <gems-file-upload
            label="Anexar Documento"
            accept=".pdf,.png,.jpg,.jpeg"
            (uploadSuccess)="onUploadSuccess($event)"
            (uploadError)="onUploadError($event)"
          ></gems-file-upload>
        </div>

        @if (uploadedFileKey) {
          <div class="file-list">
            <h4>Arquivo enviado com sucesso!</h4>
            <ul>
              <li>Chave: {{ uploadedFileKey }}</li>
            </ul>
          </div>
        }
      </gems-form-card>
    </div>

    <div class="demo-code">
      <app-code-snippet [tabs]="codeTabs"></app-code-snippet>
    </div>
  </div>
</div>
