<button
  [type]="type()"
  class="gems-btn"
  [class]="variantClass()"
  [class.gems-btn--loading]="loading()"
  [class.gems-btn--icon-only]="!label() && icon()"
  [disabled]="disabled() || loading()"
  [attr.aria-busy]="loading() || null"
  [attr.aria-label]="ariaLabel() || label() || null"
>
  @if (loading()) {
    <span class="gems-btn-spinner" aria-hidden="true"></span>
  } @else if (icon() && iconPosition() === 'left') {
    <i [class]="icon()" aria-hidden="true"></i>
  }

  @if (label()) {
    <span class="gems-btn-label">{{ label() }}</span>
  }

  @if (!loading() && icon() && iconPosition() === 'right') {
    <i [class]="icon()" aria-hidden="true"></i>
  }
</button>
