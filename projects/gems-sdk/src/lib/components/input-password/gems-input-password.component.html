<div class="gems-input-container">
  @if (label()) {
  <label [for]="inputId()" class="gems-label" [class.gems-required]="required()">
    {{ label() }}
  </label>
  }

  <div class="gems-password-wrapper">
    <input
      [type]="showPassword() ? 'text' : 'password'"
      [id]="inputId()"
      class="gems-input"
      [placeholder]="placeholder()"
      [value]="value()"
      [disabled]="disabled()"
      [required]="required()"
      (input)="onInput($event)"
    />
    <button
      type="button"
      class="gems-toggle-btn"
      tabindex="-1"
      [attr.aria-label]="showPassword() ? 'Ocultar senha' : 'Exibir senha'"
      (click)="togglePasswordVisibility()"
    >
      <i
        class="fa-solid"
        [class.fa-eye]="!showPassword()"
        [class.fa-eye-slash]="showPassword()"
      ></i>
    </button>
  </div>
</div>
