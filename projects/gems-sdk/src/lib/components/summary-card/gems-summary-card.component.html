<div
  class="gems-summary-card-container"
  [class.gems-is-expanded]="expanded()"
>
  <div
    class="gems-summary-card-header"
    role="button"
    tabindex="0"
    [attr.aria-expanded]="expanded()"
    (click)="toggle()"
    (keydown.enter)="toggle()"
    (keydown.space)="toggle()"
  >
    <div class="gems-header-main">
      @if (icon()) {
        <div class="gems-icon-wrapper">
          <i [class]="icon()"></i>
        </div>
      }
      <div class="gems-title-wrapper">
        <h3 class="gems-card-title">{{ title() }}</h3>
        @if (!expanded()) {
          <div class="gems-summary-preview">
            <ng-content select="[summary]"></ng-content>
          </div>
        }
      </div>
    </div>

    <div class="gems-header-actions">
      <i
        class="fa-solid"
        [class.fa-chevron-up]="expanded()"
        [class.fa-chevron-down]="!expanded()"
      ></i>
    </div>
  </div>

  <div
    class="gems-summary-card-details"
    [@expandCollapse]="expanded() ? 'expanded' : 'collapsed'"
  >
    <div class="gems-details-inner">
      <ng-content select="[details]"></ng-content>
    </div>
  </div>
</div>
