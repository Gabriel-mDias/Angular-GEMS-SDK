@if (label()) {
  <label [for]="textareaId" class="gems-textarea-label">
    {{ label() }}
    @if (required()) {
      <span class="gems-required" aria-hidden="true">*</span>
    }
  </label>
}

<textarea
  [id]="textareaId"
  class="gems-textarea-field"
  [class.gems-textarea-autoresize]="autoResize()"
  [placeholder]="placeholder()"
  [disabled]="disabled()"
  [required]="required()"
  [rows]="rows()"
  [attr.maxlength]="maxlength() || null"
  [attr.aria-label]="label() || null"
  (input)="onInput($event)"
  (blur)="onTouched()"
>{{ value }}</textarea>

@if (maxlength()) {
  <p class="gems-textarea-counter">{{ value.length }} / {{ maxlength() }}</p>
}
