<div class="gems-input-container">
  @if (label()) {
    <label [for]="inputId()" class="gems-label" [class.gems-required]="required()">
      {{ label() }}
    </label>
  }

  <div class="gems-input-wrapper">
    @if (icon()) {
      <i [class]="icon() + ' gems-input-icon'" aria-hidden="true"></i>
    }
    <input
      [type]="maskType() === 'email' ? 'email' : 'text'"
      [id]="inputId()"
      class="gems-input"
      [class.gems-with-icon]="icon()"
      [placeholder]="placeholder()"
      [value]="displayValue()"
      [disabled]="disabled()"
      [required]="required()"
      (input)="onInput($event)"
      (blur)="onBlur()"
    />
  </div>
</div>
