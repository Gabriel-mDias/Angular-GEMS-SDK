<div class="gems-input-container">
  <label *ngIf="label()" [for]="id()" class="gems-label" [class.gems-required]="required()">
    {{ label() }}
  </label>
  <div class="gems-data-wrapper">
    <i class="fa-regular fa-calendar gems-input-icon gems-clickable" (click)="toggleDatePicker()"></i>
    <input 
      type="text" 
      [id]="id()"
      class="gems-input gems-with-icon"
      [placeholder]="internalPlaceholder()"
      [value]="displayValue()"
      (input)="onInput($event)"
      [disabled]="disabled()"
      [required]="required()"
    >
    
    <input 
      #nativeInput
      [type]="getNativeType()"
      class="gems-hidden-native-input"
      [value]="value()"
      (change)="onNativeChange($event)"
      *ngIf="formato() !== 'ano'"
    >
  </div>
</div>
